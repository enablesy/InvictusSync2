  ticket-error: "§cError al enviar el ticket. Inténtalo de nuevo."
  ticket-cooldown: "§cDebes esperar antes de enviar otro ticket."

  # Spam/flood
  spam-staff-notify: "§c§l[SPAM] §r§7Reporte automático: §e{player} §7— {detail}"
  caps-staff-notify: "§e§l[CAPS] §r§7Advertencia automática: §e{player}"

  # Anti evasión
  evasion-staff-notify: "§c§l[EVASIÓN] §r§7{player} §cconectado con IP de ban previo."

  # Alertas TPS/RAM
